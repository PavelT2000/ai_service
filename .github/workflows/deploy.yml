name: Deploy AI Service to Orange Pi

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Переходим в папку сервиса
            cd ~/My/ai_service
            
            # 1. Синхронизируем код с GitHub
            # (Убедись, что в этой папке на плате уже сделан git clone этого репозитория)
            git fetch --all
            git reset --hard origin/main
            
            # 2. Обновляем зависимости (если используешь системный питон)
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            fi
            
            # 3. Перезапускаем сервис, который мы создали ранее
            sudo systemctl restart ai-service.service
            
            # 4. Проверка
            systemctl is-active ai-service.service
