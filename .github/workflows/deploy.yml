name: Deploy AI Service to Orange Pi

on:
  push:
    branches: [ main ] # Деплой сработает при каждом пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Подключаем виртуальную машину GitHub к твоему Tailscale
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # 2. Копируем файлы на Orange Pi (используем rsync для скорости)
      - name: Deploy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: orangepi
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/orangepi/My/ai_service"
          rm: false # Не удалять старые файлы (например, .env или логи)

      # 3. Установка зависимостей и перезапуск сервиса
      - name: Restart AI Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: orangepi
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/orangepi/My/ai_service
            # Если используешь venv, раскомментируй строку ниже:
            # source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart ai-service
            sudo systemctl status ai-service | grep "Active"
